<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSC Phase XIII — Post Code Grid</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2333;
  --border: #21262d;
  --text: #e6edf3;
  --text-dim: #7d8590;
  --text-mid: #8b949e;

  --cr:  #58a6ff; --cr-bg:  rgba(88,166,255,0.10); --cr-bd:  rgba(88,166,255,0.30);
  --er:  #3fb950; --er-bg:  rgba(63,185,80,0.10);  --er-bd:  rgba(63,185,80,0.30);
  --kkr: #bc8cff; --kkr-bg: rgba(188,140,255,0.10);--kkr-bd: rgba(188,140,255,0.30);
  --mpr: #ffa657; --mpr-bg: rgba(255,166,87,0.10); --mpr-bd: rgba(255,166,87,0.30);
  --ner: #39d3f2; --ner-bg: rgba(57,211,242,0.10); --ner-bd: rgba(57,211,242,0.30);
  --nr:  #e879f9; --nr-bg:  rgba(232,121,249,0.10);--nr-bd:  rgba(232,121,249,0.30);
  --nwr: #a8d55c; --nwr-bg: rgba(168,213,92,0.10); --nwr-bd: rgba(168,213,92,0.30);
  --sr:  #ff7b72; --sr-bg:  rgba(255,123,114,0.10);--sr-bd:  rgba(255,123,114,0.30);
  --wr:  #f0c45b; --wr-bg:  rgba(240,196,91,0.10); --wr-bd:  rgba(240,196,91,0.30);

  --l1: #6b7280; --l2: #9ca3af;
  --l3: #60a5fa; --l4: #3b82f6;
  --l5: #a78bfa; --l6: #f59e0b;
  --l7: #f87171; --l8: #ef4444;

  --ann: #ffd700;
  --ann-bg: rgba(255,215,0,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ─── LEGENDS ─── */
.legends {
  display: flex;
  gap: 20px;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-wrap: wrap;
  align-items: center;
}
.leg-label {
  font-size: 10px;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.8px;
  text-transform: uppercase;
}
.leg-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.leg-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-mid);
  white-space: nowrap;
}
.leg-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
.leg-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }

/* ─── GRID ─── */
.grid-outer { padding: 20px 24px 48px; }

.region-section { margin-bottom: 28px; }
.region-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.rh-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 4px;
  letter-spacing: 0.5px;
}
.rh-name { font-size: 12px; color: var(--text-mid); }
.rh-ann { font-size: 11px; color: var(--ann); font-family: 'JetBrains Mono', monospace; }
.rh-count { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); margin-left: auto; }

.post-grid { display: flex; flex-wrap: wrap; gap: 7px; }

/* ─── CARD ─── */
.pcard {
  position: relative;
  width: 112px;
  border-radius: 7px;
  border: 1px solid;
  padding: 8px 9px 7px;
  cursor: default;
  transition: transform .12s, box-shadow .12s;
}
.pcard:hover { transform: translateY(-2px); z-index: 2; }

.pcard .code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  font-weight: 700;
  letter-spacing: 0.3px;
  line-height: 1;
  margin-bottom: 5px;
}
.pcard .pname {
  font-size: 9.5px;
  color: rgba(255,255,255,0.5);
  line-height: 1.35;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  min-height: 26px;
}
.pcard .meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 6px;
  padding-top: 5px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.lvl-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.lvl-tag { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.3); margin-left: 4px; }
.total-vac { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 600; color: rgba(255,255,255,0.6); }

/* ─── ANNOUNCED ─── */
.pcard.announced {
  border-color: rgba(255,215,0,0.5) !important;
  background: var(--ann-bg) !important;
  box-shadow: 0 0 0 1px rgba(255,215,0,0.18), 0 0 12px rgba(255,215,0,0.10);
}
.pcard.announced .code { color: var(--ann) !important; }
.pcard.announced .pname { color: rgba(255,215,0,0.55) !important; }
.pcard.announced .meta { border-color: rgba(255,215,0,0.12) !important; }
.pcard.announced .total-vac { color: var(--ann) !important; }
.pcard.announced::after {
  content: '✓';
  position: absolute; top: 5px; right: 7px;
  font-size: 9px; color: var(--ann); font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}

/* Region themes */
.pcard.CR { background: var(--cr-bg); border-color: var(--cr-bd); }
.pcard.CR .code { color: var(--cr); }
.pcard.CR:hover { box-shadow: 0 4px 14px rgba(88,166,255,0.14); }

.pcard.ER { background: var(--er-bg); border-color: var(--er-bd); }
.pcard.ER .code { color: var(--er); }
.pcard.ER:hover { box-shadow: 0 4px 14px rgba(63,185,80,0.14); }

.pcard.KKR { background: var(--kkr-bg); border-color: var(--kkr-bd); }
.pcard.KKR .code { color: var(--kkr); }
.pcard.KKR:hover { box-shadow: 0 4px 14px rgba(188,140,255,0.14); }

.pcard.MPR { background: var(--mpr-bg); border-color: var(--mpr-bd); }
.pcard.MPR .code { color: var(--mpr); }
.pcard.MPR:hover { box-shadow: 0 4px 14px rgba(255,166,87,0.14); }

.pcard.NER { background: var(--ner-bg); border-color: var(--ner-bd); }
.pcard.NER .code { color: var(--ner); }
.pcard.NER:hover { box-shadow: 0 4px 14px rgba(57,211,242,0.14); }

.pcard.NR { background: var(--nr-bg); border-color: var(--nr-bd); }
.pcard.NR .code { color: var(--nr); }
.pcard.NR:hover { box-shadow: 0 4px 14px rgba(232,121,249,0.14); }

.pcard.NWR { background: var(--nwr-bg); border-color: var(--nwr-bd); }
.pcard.NWR .code { color: var(--nwr); }
.pcard.NWR:hover { box-shadow: 0 4px 14px rgba(168,213,92,0.14); }

.pcard.SR { background: var(--sr-bg); border-color: var(--sr-bd); }
.pcard.SR .code { color: var(--sr); }
.pcard.SR:hover { box-shadow: 0 4px 14px rgba(255,123,114,0.14); }

.pcard.WR { background: var(--wr-bg); border-color: var(--wr-bd); }
.pcard.WR .code { color: var(--wr); }
.pcard.WR:hover { box-shadow: 0 4px 14px rgba(240,196,91,0.14); }

/* Level dots */
.l1{background:var(--l1)} .l2{background:var(--l2)} .l3{background:var(--l3)} .l4{background:var(--l4)}
.l5{background:var(--l5)} .l6{background:var(--l6)} .l7{background:var(--l7)} .l8{background:var(--l8)}

/* Tooltip */
.pcard:hover .tooltip { display: block; }
.tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%; transform: translateX(-50%);
  background: #1f2937;
  border: 1px solid #374151;
  border-radius: 6px;
  padding: 9px 11px;
  min-width: 210px;
  max-width: 250px;
  z-index: 100;
  pointer-events: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.tooltip .t-code { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; margin-bottom: 4px; }
.tooltip .t-name { font-size: 11px; color: #d1d5db; margin-bottom: 5px; line-height: 1.4; }
.tooltip .t-dept { font-size: 10px; color: #9ca3af; margin-bottom: 6px; line-height: 1.3; border-bottom: 1px solid #374151; padding-bottom: 6px; }
.tooltip .t-row { display: flex; justify-content: space-between; font-size: 10px; font-family: 'JetBrains Mono', monospace; color: #9ca3af; margin-top: 3px; gap: 8px; }
.tooltip .t-row span:last-child { color: #e5e7eb; font-weight: 600; text-align: right; }
.tooltip .t-total span { color: #f9fafb !important; font-size: 11px; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

    <div class="t-row"><span>Age</span><span>${r.age}</span></div>
    <div class="t-row"><span>SC / ST / OBC</span><span>${r.sc} / ${r.st} / ${r.obc}</span></div>
    <div class="t-row"><span>UR / EWS</span><span>${r.ur} / ${r.ews}</span></div>
    <div class="t-row t-total"><span>Total Vacancies</span><span>${r.total}</span></div>
    ${ann ? '<div class="t-row" style="color:var(--ann);margin-top:4px"><span>✓ Result Announced</span></div>' : ''}
  </div>`;
  return `<div class="pcard ${r.region}${ann?' announced':''}">
    ${tooltip}
    <div class="code">${r.post_code}</div>
    <div class="pname">${nameShort}</div>
    <div class="meta">
      <div style="display:flex;align-items:center">
        <div class="lvl-dot l${ln}"></div>
        <span class="lvl-tag">L${ln}</span>
      </div>
      <div class="total-vac">${r.total}v</div>
    </div>
  </div>`;
}

function render(){
  const byRegion = {};
  REGION_ORDER.forEach(r => byRegion[r] = []);
  DATA.forEach(r => { if(byRegion[r.region]) byRegion[r.region].push(r); });

  let html = '';
  REGION_ORDER.forEach(reg => {
    const posts = byRegion[reg];
    if(!posts.length) return;
    const annCount = posts.filter(p => ANNOUNCED.has(p.post_code)).length;
    html += `<div class="region-section">
      <div class="region-header">
        <span class="rh-badge" style="background:var(--${reg.toLowerCase()}-bg);color:var(--${reg.toLowerCase()});border:1px solid var(--${reg.toLowerCase()}-bd)">${reg}</span>
        <span class="rh-name">${REGION_NAMES[reg]}</span>
        ${annCount ? `<span class="rh-ann">✓ ${annCount} announced</span>` : ''}
        <span class="rh-count">${posts.length} posts</span>
      </div>
      <div class="post-grid">${posts.map(card).join('')}</div>
    </div>`;
  });

  document.getElementById('gridOuter').innerHTML = html;
}

window.markAnnounced = function(codes){
  if(typeof codes === 'string') codes = [codes];
  codes.forEach(c => ANNOUNCED.add(c.trim().toUpperCase()));
  render();
};
window.clearAnnounced = function(){ ANNOUNCED.clear(); render(); };

render();
</script>
</body>
</html>
